<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SGIPC Website</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  
  <main>
    <section class="login-container">
      <div class="login-box">
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Log in to your SGIPC account</p>
        
        <form class="login-form">
          <div class="form-group">
            <label for="email">Roll Number</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember">
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password">Forgot Password?</a>
          </div>

          <button type="submit" class="login-submit-btn">Log In</button>
        </form>

        <div class="divider">
          <span>or</span>
        </div>

       

        <p class="signup-link">
          Don't have an account? <a href="register.html">Sign up here</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const hamburger = document.getElementById('hamburger');
      const navMenu = document.getElementById('navMenu');
      const navLinks = navMenu.querySelectorAll('a');

      // Toggle menu on hamburger click
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        navMenu.classList.toggle('active');
        hamburger.classList.toggle('active');
      });

      // Close menu when a nav link is clicked
      navLinks.forEach(link => {
        link.addEventListener('click', function() {
          navMenu.classList.remove('active');
          hamburger.classList.remove('active');
        });
      });

      // Close menu when clicking outside
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.navbar')) {
          navMenu.classList.remove('active');
          hamburger.classList.remove('active');
        }
      });

      // Login form submission
      const loginForm = document.querySelector('.login-form');
      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        console.log('Login attempt:', { email, password });
        // Add your login logic here
      });
    });
  </script>

</body>
</html>
