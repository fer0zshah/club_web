<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Workshop - SGIPC</title>
  <link rel="stylesheet" href="home.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <header class="navbar">
    <div class="logo-container">
      <img src="logo.png" alt="SGIPC Logo" class="logo-image" style="height: 60px;">
    </div>
    <div style="color: white; font-size: 1.2rem; font-weight: bold;">Executive Panel</div>
    <div class="nav-actions">
      <a href="home.html" class="login-btn">Back to Site</a>
    </div>
  </header>

  <div class="admin-container">
    <aside class="admin-sidebar">
      <ul class="sidebar-menu">
        <li><a href="admin.html">Create Contest</a></li>
        <li><a href="admin-workshop.html" class="active">Create Workshop</a></li>
        <li><a href="admin-manage-events.html">Manage Events</a></li>
        <li><a href="admin-manage-users.html">Manage Users</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1 style="color: white; font-size: 2rem;">Create New Workshop</h1>
        <p style="color: #888;">Add a new training or workshop to the website.</p>
      </div>

      <div class="form-card">
        <form action="#" method="POST">
          <div class="form-group">
            <label for="title">Workshop Title</label>
            <input type="text" id="title" placeholder="e.g., Advanced Graph Theory Bootcamp">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="start-time">Start Time</label>
              <input type="datetime-local" id="start-time">
            </div>
            <div class="form-group">
              <label for="end-time">End Time</label>
              <input type="datetime-local" id="end-time">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="location">Location</label>
              <input type="text" id="location" placeholder="e.g., Seminar Room, 8th Floor">
            </div>
            <div class="form-group">
              <label for="skill-level">Skill Level</label>
              <select id="skill-level">
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
              </select>
            </div>
            <div class="form-group">
              <label for="instructor">Instructor</label>
              <input type="text" id="instructor" placeholder="e.g., Kazi Saeed Alam">
            </div>
          </div>

          <div class="form-group">
            <label for="description">Workshop Description & Curriculum (HTML/Text allowed)</label>
            <textarea id="description" rows="6" placeholder="Write course detailed syllabus, prerequisites..."></textarea>
          </div>

          <button type="button" class="btn-submit" onclick="alert('In a real app, this would save to a database using PHP/SQL or Firebase!')">Publish Workshop</button>
        </form>
      </div>
    </main>
  </div>

</body>
</html>
