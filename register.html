<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SGIPC Website</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>

    <header class="navbar">
    <div class="logo-container">
      <img src="logo.png" alt="SGIPC Logo" class="logo-image">
    </div>

    <!-- Hamburger Menu -->
    <button class="hamburger-menu" id="hamburger" aria-label="Toggle Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav-links" id="navMenu">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="about.html" id="aboutNavLink">About <span class="dropdown-arrow">&#9662;</span></a></li>
        <li><a href="#">Events</a></li>
        <li><a href="#">Contest <span class="dropdown-arrow">&#9662;</span></a></li>
        <li><a href="#">Training <span class="dropdown-arrow">&#9662;</span></a></li>
        <li><a href="gallery.html" id="galleryNavLink">Gallery</a></li>
        <li><a href="#">Contacts</a></li>
      </ul>
    </nav>

    <div class="nav-actions">
      <a href="login.html" class="login-btn">
        <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
        </svg>
        <span>Log In</span>
      </a>
      
      <a href="register.html" class="register-btn">
        <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
        <span>Register</span>
      </a>

      <button class="theme-toggle" aria-label="Toggle Dark Mode">
        <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </div>
  </header>
  
  <main>
    <section class="register-container">
      <div class="register-box">
        <h2>Join SGIPC</h2>
        <p class="register-subtitle">Create your account to get started</p>
        
        <form class="register-form">
          <div class="form-row">
                <div class="form-group">
            <label for="roll">Roll Number</label>
            <input type="roll" id="roll" name="roll" placeholder="Your roll number">
          </div>
                      <div class="form-group">
              <label for="dept">Department</label>
              <input type="dept" id="dept" name="dept" required placeholder="Your department">
            </div>
            <div class="form-group">
              <label for="firstname">First Name</label>
              <input type="text" id="firstname" name="firstname" required placeholder="Your first name">
            </div>

            <div class="form-group">
              <label for="lastname">Last Name</label>
              <input type="text" id="lastname" name="lastname" required placeholder="Your last name">
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Your phone number">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a strong password">
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm your password">
          </div>

          <div class="form-options">
            <label class="accept-terms">
              <input type="checkbox" name="terms" required>
              <span>I agree to the <a href="#">Terms & Conditions</a></span>
            </label>
          </div>

          <button type="submit" class="register-submit-btn">Create Account</button>
        </form>

        <div class="divider">
          <span>or</span>
        </div>

       
        <p class="login-link">
          Already have an account? <a href="login.html">Log in here</a>
        </p>
      </div>
    </section>
  </main>

  

</body>
</html>
